<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mac App Team ID Lookup</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 600px;
        margin: 40px auto;
        background: #fff;
        padding: 20px 30px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      h1 {
        font-size: 24px;
        margin-bottom: 10px;
      }
      p {
        color: #555;
      }
      label {
        margin-top: 15px;
        display: block;
        font-weight: bold;
      }
      select,
      input,
      textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      textarea {
        resize: vertical;
        min-height: 120px;
      }
      form {
        margin-top: 30px;
      }
      .result-row {
        margin-top: 8px;
        font-size: 16px;
      }
      .result-label {
        font-weight: bold;
        margin-right: 6px;
      }
      #result {
        margin-top: 20px;
        color: #333;
      }
      #teamId {
        color: #0066cc;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Mac App Team ID Lookup</h1>
      <p>Select a Mac app from the list below to view its Apple Developer Team ID. The data is compiled from the Installomator project and additional vendor documentation.</p>
      <label for="appSelect">App:</label>
      <select id="appSelect">
        <option value="">-- Select an App --</option>
      </select>
      <div id="result">
        <div class="result-row">
          <span class="result-label">Team ID:</span><span id="teamId"></span>
        </div>
        <div class="result-row">
          <span class="result-label">Domain:</span><span id="domain"></span>
        </div>
        <div class="result-row">
          <span class="result-label">Code Requirement:</span><span id="codeRequirement"></span>
        </div>
      </div>
      <form id="appForm">
        <label for="formAppName">App Name</label>
        <input type="text" id="formAppName" name="appName" required />
        <label for="formTeamId">Team ID</label>
        <input type="text" id="formTeamId" name="teamId" required />
        <label for="formDomain">Domain</label>
        <input type="text" id="formDomain" name="domain" placeholder="example.com" />
        <label for="formCodeRequirement">Code Requirement</label>
        <textarea
          id="formCodeRequirement"
          name="codeRequirement"
          placeholder="anchor apple generic and certificate conditions..."
        ></textarea>
        <button type="submit">Generate JSON Entry</button>
      </form>
      <label for="jsonOutput">JSON Snippet</label>
      <textarea id="jsonOutput" readonly placeholder="Generated JSON will appear here."></textarea>
    </div>
    <script src="./team_app_mac_team_ids.js"></script>
    <script>
      (function populateAppSelect() {
        const data = window.teamAppMacTeamIdsData;
        if (!data) {
          console.error('Team data was not loaded. Ensure team_app_mac_team_ids.js is accessible.');
          return;
        }

        const select = document.getElementById('appSelect');
        const teamIdSpan = document.getElementById('teamId');
        const domainSpan = document.getElementById('domain');
        const codeReqSpan = document.getElementById('codeRequirement');
        const form = document.getElementById('appForm');
        const nameInput = document.getElementById('formAppName');
        const teamIdInput = document.getElementById('formTeamId');
        const domainInput = document.getElementById('formDomain');
        const codeReqInput = document.getElementById('formCodeRequirement');
        const jsonOutput = document.getElementById('jsonOutput');

        const appNames = Object.keys(data).sort((a, b) => a.localeCompare(b));
        appNames.forEach((name) => {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          select.appendChild(option);
        });

        function renderAppDetails(appName) {
          const record = data[appName];
          if (record) {
            teamIdSpan.textContent = record.teamId || '';
            domainSpan.textContent = record.domain || 'Not provided';
            codeReqSpan.textContent = record.codeRequirement || 'Not provided';
          } else {
            teamIdSpan.textContent = '';
            domainSpan.textContent = '';
            codeReqSpan.textContent = '';
          }
        }

        function populateForm(appName) {
          const record = data[appName];
          if (record) {
            nameInput.value = appName;
            teamIdInput.value = record.teamId || '';
            domainInput.value = record.domain || '';
            codeReqInput.value = record.codeRequirement || '';
          } else {
            nameInput.value = appName || '';
            teamIdInput.value = '';
            domainInput.value = '';
            codeReqInput.value = '';
          }
        }

        select.addEventListener('change', () => {
          const selected = select.value;
          if (selected) {
            renderAppDetails(selected);
            populateForm(selected);
            jsonOutput.value = '';
          } else {
            renderAppDetails('');
            populateForm('');
            jsonOutput.value = '';
          }
        });

        form.addEventListener('submit', (event) => {
          event.preventDefault();
          const appName = nameInput.value.trim();
          const teamId = teamIdInput.value.trim();
          const domain = domainInput.value.trim();
          const codeRequirement = codeReqInput.value.trim();

          if (!appName || !teamId) {
            alert('App Name and Team ID are required.');
            return;
          }

          const snippet = {
            [appName]: {
              teamId,
              domain,
              codeRequirement,
            },
          };

          jsonOutput.value = JSON.stringify(snippet, null, 2);
        });
      })();
    </script>
  </body>
</html>
